<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Video Factory V18</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#071022;color:white;font-family:Arial,sans-serif;min-height:100vh;padding:24px}
    .wrap{max-width:1180px;margin:auto}
    .top,.card{background:#121c36;border:1px solid #2b3d67;border-radius:22px;padding:24px;margin-bottom:18px}
    h1{margin:0;color:#66aaff;font-size:34px}
    h2{color:#66aaff;margin-top:0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    label{display:block;margin-top:14px;margin-bottom:7px}
    input,textarea,select{width:100%;padding:14px;border-radius:12px;border:1px solid #385079;background:#202b49;color:white;font-size:15px}
    textarea{min-height:130px}
    button{border:0;border-radius:12px;padding:15px 22px;margin-top:18px;font-weight:bold;cursor:pointer;background:#55ff88;color:#061018;font-size:16px}
    .blue{background:#6bb6ff}
    .status{margin-top:18px;background:#0c152a;border:1px solid #26385f;border-radius:15px;padding:16px;line-height:1.7}
    .ok{color:#55ff88}.err{color:#ff6666}.warn{color:#ffd166}
    code{display:block;background:#050b16;padding:10px;border-radius:10px;word-break:break-all;margin:8px 0}
    pre{white-space:pre-wrap;word-break:break-word;background:#050b16;padding:12px;border-radius:10px}
    @media(max-width:850px){.grid{grid-template-columns:1fr}body{padding:12px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🚀 AI VIDEO FACTORY V18</h1>
    <p>Form → n8n Webhook → Render API bağlantılı test paneli</p>
    <div class="status">
      <b>Canlı Panel:</b>
      <code>https://yotube-gelisimotomasyon1.onrender.com</code>
      <b>Render API:</b>
      <code>https://ai-video-factory-api.onrender.com/render</code>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Video Ayarları</h2>
      <label>Video Başlığı</label>
      <input id="title" value="kediler">

      <label>Senaryo</label>
      <textarea id="story">hayvan şakaları</textarea>

      <label>Video Türü</label>
      <select id="type">
        <option>Shorts</option>
        <option selected>Uzun Video</option>
        <option>Instagram Reels</option>
      </select>

      <label>Sahne Sayısı</label>
      <input id="scene" type="number" value="5">

      <button onclick="startN8n()">🎬 Video Üret</button>
    </div>

    <div class="card">
      <h2>Render / n8n Ayarları</h2>
      <label>n8n Webhook URL</label>
      <input id="n8n" value="https://gelisimotomasyon.app.n8n.cloud/webhook/ai-video-factory-v18">

      <label>Render API URL</label>
      <input id="api" value="https://ai-video-factory-api.onrender.com/render">

      <button onclick="saveSettings()">💾 Ayarları Kaydet</button>
      <button class="blue" onclick="testApi()">🔍 Render API Test Et</button>

      <div class="status" id="saveStatus">Sistem hazır.</div>
    </div>
  </div>

  <div class="card">
    <h2>Sistem Durumu</h2>
    <div class="status" id="result">
      <span class="warn">Bekliyor...</span>
    </div>
  </div>
</div>

<script>
function saveSettings(){
  ['n8n','api'].forEach(id=>{
    localStorage.setItem(id, document.getElementById(id).value);
  });
  document.getElementById('saveStatus').innerHTML='<span class="ok">✔ Ayarlar kaydedildi</span>';
}

window.onload=()=>{
  ['n8n','api'].forEach(id=>{
    const saved=localStorage.getItem(id);
    if(saved) document.getElementById(id).value=saved;
  });
}

async function startN8n(){
  const webhook=document.getElementById('n8n').value.trim();
  const payload={
    title:document.getElementById('title').value,
    story:document.getElementById('story').value,
    type:document.getElementById('type').value,
    scene_count:document.getElementById('scene').value,
    render_api_url:document.getElementById('api').value
  };

  document.getElementById('result').innerHTML='<span class="warn">⏳ n8n webhook çağrılıyor...</span>';

  try{
    const res=await fetch(webhook,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    const text=await res.text();
    let data;
    try{data=JSON.parse(text)}catch(e){data={raw:text}}

    document.getElementById('result').innerHTML=
      '<span class="ok">✔ n8n bağlantısı başarılı</span><br><pre>'+JSON.stringify(data,null,2)+'</pre>';
  }catch(err){
    document.getElementById('result').innerHTML=
      '<span class="err">❌ n8n bağlantı hatası</span><br>'+err+
      '<br><br><span class="warn">Not: n8n workflow Published/Active olmalı ve Production URL kullanılmalı.</span>';
  }
}

async function testApi(){
  const api=document.getElementById('api').value.trim();
  document.getElementById('result').innerHTML='<span class="warn">⏳ Render API test ediliyor...</span>';

  try{
    const res=await fetch(api,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:'test',story:'test senaryosu',type:'Shorts',scene_count:5})
    });
    const data=await res.json();
    document.getElementById('result').innerHTML=
      '<span class="ok">✔ Render API çalışıyor</span><br><pre>'+JSON.stringify(data,null,2)+'</pre>';
  }catch(err){
    document.getElementById('result').innerHTML='<span class="err">❌ Render API hatası</span><br>'+err;
  }
}
</script>
</body>
</html>
